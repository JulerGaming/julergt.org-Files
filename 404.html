<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            font-size: 1.5em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        th {
            text-align: left;
            background-color: #f4f4f4;
        }
        td a {
            text-decoration: none;
            color: blue;
        }
        td a:hover {
            text-decoration: underline;
        }
        
        .error {
            text-align: center;
            margin-top: 50px;
        }

        .error button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="error">
        <h1>404 Not Found</h1>
        <p>The requested file was not found.</p>
        <button>Go Home</button>
    </div>
</body>
</html>
